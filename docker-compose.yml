version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aegisflow_postgres

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database:/database

volumes:
  postgres_data: